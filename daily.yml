name: RFQ fetch & publish

on:
  schedule:
    - cron: "0 6 * * *"      # her gün 06:00 UTC (~09:00 TR)
  workflow_dispatch: {}        # elle tetikleme düğmesi
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Fetch RFQs (TED + CanadaBuys + SAM.gov)
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}   # yoksa SAM atlanır
        run: python fetch_all.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
